openapi: 3.1.0
info:
  title: Intervals.icu Relay API
  version: 0.3.0

servers:
  - url: https://intervals-icu-relay.onrender.com

security:
  - bearerAuth: []

paths:
  /healthz:
    get:
      operationId: healthCheck
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true

  /intervals/activities:
    get:
      operationId: getActivities
      summary: Get activities for a date range
      parameters:
        - name: start
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: end
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Activities
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties: {}
                  additionalProperties: true

  /intervals/wellness:
    get:
      operationId: getWellness
      summary: Get wellness entries for a date range
      parameters:
        - name: start
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: end
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Wellness
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties: {}
                  additionalProperties: true

  /intervals/activity/{activity_id}/streams:
    get:
      operationId: getActivityStreams
      summary: Get activity streams as JSON
      parameters:
        - name: activity_id
          in: path
          required: true
          schema:
            type: string
        - name: types
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated stream types
      responses:
        "200":
          description: Streams
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true

  /intervals/activity/{activity_id}/file:
    get:
      operationId: getActivityOriginalFile
      summary: Download original activity file
      parameters:
        - name: activity_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Original file
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /intervals/activity/{activity_id}/fit-file:
    get:
      operationId: getActivityFitFile
      summary: Download Intervals generated FIT file
      parameters:
        - name: activity_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: FIT file
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /analysis/training-quality:
    get:
      operationId: analyzeTrainingQuality
      summary: Analyze training quality for a date range
      parameters:
        - name: start
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: end
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Training quality analysis
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true

  /analysis/workout-quality:
    get:
      operationId: analyzeWorkoutQuality
      summary: Analyze workout quality for a date range
      parameters:
        - name: start
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: end
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Workout quality analysis
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true

  /analysis/endurance-efficiency:
    get:
      operationId: analyzeEnduranceEfficiency
      summary: Analyze endurance efficiency for a date range
      parameters:
        - name: start
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: end
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Endurance efficiency analysis
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true

  /analysis/training-quality-timeseries:
    get:
      operationId: analyzeTrainingQualityTimeseries
      summary: Analyze training quality over time
      parameters:
        - name: start
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: end
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: granularity
          in: query
          required: false
          schema:
            type: string
            enum: [day, week]
            default: week
      responses:
        "200":
          description: Time series analysis
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true

  /analysis/workout-detail/{activity_id}:
    get:
      operationId: analyzeWorkoutDetail
      summary: Analyze a single workout from detailed streams
      parameters:
        - name: activity_id
          in: path
          required: true
          schema:
            type: string
        - name: warmup_exclude_seconds
          in: query
          required: false
          schema:
            type: integer
            default: 600
      responses:
        "200":
          description: Detailed workout analysis
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true

  /analysis/endurance-efficiency-detail:
    get:
      operationId: analyzeEnduranceEfficiencyDetail
      summary: List endurance candidates for detailed review
      parameters:
        - name: start
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: end
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Detailed endurance candidate list
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true

components:
  schemas: {}
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer        - name: end
          in: query
          required: true
          description: End date in YYYY-MM-DD
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Wellness entries fetched successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true

  /analysis/training-quality:
    get:
      operationId: analyzeTrainingQuality
      summary: Analyze training quality for a date range
      security:
        - bearerAuth: []
      parameters:
        - name: start
          in: query
          required: true
          description: Start date in YYYY-MM-DD
          schema:
            type: string
            format: date
        - name: end
          in: query
          required: true
          description: End date in YYYY-MM-DD
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Training quality analysis result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /analysis/workout-quality:
    get:
      operationId: analyzeWorkoutQuality
      summary: Analyze workout quality in a date range
      security:
        - bearerAuth: []
      parameters:
        - name: start
          in: query
          required: true
          description: Start date in YYYY-MM-DD
          schema:
            type: string
            format: date
        - name: end
          in: query
          required: true
          description: End date in YYYY-MM-DD
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Workout quality analysis result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /analysis/endurance-efficiency:
    get:
      operationId: analyzeEnduranceEfficiency
      summary: Analyze endurance efficiency in a date range
      security:
        - bearerAuth: []
      parameters:
        - name: start
          in: query
          required: true
          description: Start date in YYYY-MM-DD
          schema:
            type: string
            format: date
        - name: end
          in: query
          required: true
          description: End date in YYYY-MM-DD
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Endurance efficiency analysis result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /analysis/training-quality-timeseries:
    get:
      operationId: analyzeTrainingQualityTimeseries
      summary: Analyze training quality over time
      security:
        - bearerAuth: []
      parameters:
        - name: start
          in: query
          required: true
          description: Start date in YYYY-MM-DD
          schema:
            type: string
            format: date
        - name: end
          in: query
          required: true
          description: End date in YYYY-MM-DD
          schema:
            type: string
            format: date
        - name: granularity
          in: query
          required: false
          description: day or week
          schema:
            type: string
            enum: [day, week]
            default: week
      responses:
        '200':
          description: Time series quality analysis result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true          description: Start date in YYYY-MM-DD
          schema:
            type: string
            format: date
        - name: end
          in: query
          required: true
          description: End date in YYYY-MM-DD
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Wellness entries fetched successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
        '401':
          description: Missing or invalid bearer token
        '502':
          description: Upstream Intervals.icu error
  /analysis/training-quality:
    get:
      operationId: analyzeTrainingQuality
      summary: Analyze training quality for a date range
      description: |
        Fetches activities and wellness entries, filters to activities with moving_time,
        counts high-load days using icu_training_load >= 60,
        and returns a simple training quality summary.
      security:
        - bearerAuth: []
      parameters:
        - name: start
          in: query
          required: true
          description: Start date in YYYY-MM-DD
          schema:
            type: string
            format: date
        - name: end
          in: query
          required: true
          description: End date in YYYY-MM-DD
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Analysis generated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  summary:
                    type: string
                    example: 2026-03-25〜2026-03-31に 6 セッション、総運動時間は約 4.0 時間です。
                  quality_score:
                    type: integer
                    example: 90
                  strengths:
                    type: array
                    items:
                      type: string
                  concerns:
                    type: array
                    items:
                      type: string
                  raw_counts:
                    type: object
                    properties:
                      sessions:
                        type: integer
                      high_load_days:
                        type: integer
                      total_duration_seconds:
                        type: integer
                      wellness_entries:
                        type: integer
        '401':
          description: Missing or invalid bearer token
        '502':
          description: Upstream Intervals.icu error
